name: Update Note Articles

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:


jobs:
  update-note:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24


    - name: Install packages
      run: npm install


    - name: Update blog.json
      run: npm run update-note


    - name: Commit changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add data/blog.json

        git commit -m "Update note articles" || exit 0

        git push